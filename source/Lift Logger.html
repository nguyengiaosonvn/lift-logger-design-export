<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lift Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e8e8ec; }
  * { box-sizing: border-box; }

  .wheel-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .wheel-scroll::-webkit-scrollbar { display: none; }
  .wheel-scroll:active { cursor: grabbing; }

  @keyframes wheelTick {
    0% { transform: scale(1); }
    40% { transform: scale(1.045); }
    100% { transform: scale(1); }
  }
  .wheel-pill { animation: wheelTick 160ms ease-out; }

  @keyframes logFlash {
    0% { transform: scale(1); }
    35% { transform: scale(0.96); }
    70% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  .log-flash { animation: logFlash 320ms cubic-bezier(.34,1.56,.64,1); }

  /* tactile press feedback for app-like taps */
  .tap { transition: transform 130ms ease, background-color 160ms ease, opacity 160ms ease; }
  .tap:active { transform: scale(0.975); }
  .day-row:active { background: var(--pill) !important; }

  /* iOS home-screen wiggle — only while editing the plan */
  @media (prefers-reduced-motion: no-preference) {
    @keyframes jiggle { 0% { transform: rotate(-0.9deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-0.9deg); } }
    .jiggle { animation: jiggle 300ms ease-in-out infinite; }
  }

  /* released pin flies in from the viewer's POV and slams into the hole */
  @keyframes pinSlam {
    0%   { transform: translate(-50%,-50%) scale(3.6); opacity: 0; }
    28%  { opacity: 1; }
    66%  { transform: translate(-50%,-50%) scale(0.8); }
    84%  { transform: translate(-50%,-50%) scale(1.1); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }
  .pin-slam { animation: pinSlam 260ms cubic-bezier(.2,1.3,.4,1); }

  @keyframes holePop {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    55%  { transform: translate(-50%, -50%) scale(1.35); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  .hole-pop { animation: holePop 240ms cubic-bezier(.34,1.56,.64,1); }

  @keyframes holeRing {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(3.2); opacity: 0; }
  }
  .hole-ring { animation: holeRing 360ms ease-out forwards; }

  /* ── Vibes ── */
  .app {
    --r-pill: 12px;
    --r-log: 29px;
    --wheel-size: 22px;
    --roller-size: 17px;
    --title-size: 34px;
    --caps: none;
    --track: 0em;
    font-family: var(--font);
    color: var(--ink);
  }
  .vibe-native {
    --font: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, 'Helvetica Neue', sans-serif;
    --bg: #fafafa;
    --sheet: #ffffff;
    --ink: #1c1c1e;
    --sub: #6e6e73;
    --mut: #aeaeb2;
    --pill: #f2f2f7;
    --log-bg: #141414;
    --log-fg: #ffffff;
  }
  .vibe-mono {
    --font: ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', monospace;
    --bg: #fbfbfa;
    --sheet: #ffffff;
    --ink: #18181a;
    --sub: #6b6b70;
    --mut: #b0b0b6;
    --pill: #f0f0ee;
    --log-bg: #18181a;
    --log-fg: #ffffff;
    --r-pill: 8px;
    --r-log: 14px;
    --wheel-size: 20px;
    --roller-size: 15px;
    --title-size: 28px;
    --caps: uppercase;
    --track: 0.06em;
  }
  body.export-freeze *, body.export-freeze *::before, body.export-freeze *::after {
    animation-delay: -99s !important;
    animation-duration: 0.001s !important;
    animation-iteration-count: 1 !important;
    animation-fill-mode: both !important;
    transition-duration: 0s !important;
  }

  .vibe-athletic {
    --font: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    --bg: #f7f6f4;
    --sheet: #ffffff;
    --ink: #161616;
    --sub: #66645f;
    --mut: #b3b1ab;
    --pill: #efeeea;
    --log-bg: var(--accent, #141414);
    --log-fg: #ffffff;
    --r-pill: 10px;
    --r-log: 16px;
    --wheel-size: 26px;
    --roller-size: 19px;
    --title-size: 40px;
    --caps: uppercase;
    --track: 0.05em;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>

</html>
