<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lift Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e8e8ec; }
  * { box-sizing: border-box; }

  .wheel-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .wheel-scroll::-webkit-scrollbar { display: none; }
  .wheel-scroll:active { cursor: grabbing; }

  @keyframes wheelTick {
    0% { transform: scale(1); }
    40% { transform: scale(1.045); }
    100% { transform: scale(1); }
  }
  .wheel-pill { animation: wheelTick 160ms ease-out; }

  @keyframes logFlash {
    0% { transform: scale(1); }
    35% { transform: scale(0.96); }
    70% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  .log-flash { animation: logFlash 320ms cubic-bezier(.34,1.56,.64,1); }

  /* tactile press feedback for app-like taps */
  .tap { transition: transform 130ms ease, background-color 160ms ease, opacity 160ms ease; }
  .tap:active { transform: scale(0.975); }
  .day-row:active { background: var(--pill) !important; }

  /* iOS home-screen wiggle — only while editing the plan */
  @media (prefers-reduced-motion: no-preference) {
    @keyframes jiggle { 0% { transform: rotate(-0.9deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-0.9deg); } }
    .jiggle { animation: jiggle 300ms ease-in-out infinite; }
  }

  /* released pin flies in from the viewer's POV and slams into the hole */
  @keyframes pinSlam {
    0%   { transform: translate(-50%,-50%) scale(3.6); opacity: 0; }
    28%  { opacity: 1; }
    66%  { transform: translate(-50%,-50%) scale(0.8); }
    84%  { transform: translate(-50%,-50%) scale(1.1); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }
  .pin-slam { animation: pinSlam 260ms cubic-bezier(.2,1.3,.4,1); }

  @keyframes holePop {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    55%  { transform: translate(-50%, -50%) scale(1.35); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  .hole-pop { animation: holePop 240ms cubic-bezier(.34,1.56,.64,1); }

  @keyframes holeRing {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(3.2); opacity: 0; }
  }
  .hole-ring { animation: holeRing 360ms ease-out forwards; }

  /* ── Vibes ── */
  .app {
    --r-pill: 12px;
    --r-log: 29px;
    --wheel-size: 22px;
    --roller-size: 17px;
    --title-size: 34px;
    --caps: none;
    --track: 0em;
    font-family: var(--font);
    color: var(--ink);
  }
  .vibe-native {
    --font: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, 'Helvetica Neue', sans-serif;
    --bg: #fafafa;
    --sheet: #ffffff;
    --ink: #1c1c1e;
    --sub: #6e6e73;
    --mut: #aeaeb2;
    --pill: #f2f2f7;
    --log-bg: #141414;
    --log-fg: #ffffff;
  }
  .vibe-mono {
    --font: ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', monospace;
    --bg: #fbfbfa;
    --sheet: #ffffff;
    --ink: #18181a;
    --sub: #6b6b70;
    --mut: #b0b0b6;
    --pill: #f0f0ee;
    --log-bg: #18181a;
    --log-fg: #ffffff;
    --r-pill: 8px;
    --r-log: 14px;
    --wheel-size: 20px;
    --roller-size: 15px;
    --title-size: 28px;
    --caps: uppercase;
    --track: 0.06em;
  }
  .vibe-athletic {
    --font: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    --bg: #f7f6f4;
    --sheet: #ffffff;
    --ink: #161616;
    --sub: #66645f;
    --mut: #b3b1ab;
    --pill: #efeeea;
    --log-bg: var(--accent, #141414);
    --log-fg: #ffffff;
    --r-pill: 10px;
    --r-log: 16px;
    --wheel-size: 26px;
    --roller-size: 19px;
    --title-size: 40px;
    --caps: uppercase;
    --track: 0.05em;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wheel-pickers.jsx"></script>
<script type="text/babel" src="machine-stack.jsx"></script>
<script type="text/babel" src="splits.jsx"></script>
<script type="text/babel" src="exercise-edit.jsx"></script>
<script type="text/babel" src="lift-logger-app.jsx"></script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
